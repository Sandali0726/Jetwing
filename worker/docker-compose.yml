services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    command: celery -A celery_app worker --loglevel=info --concurrency=4

  beat:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    command: celery -A celery_app beat --loglevel=info

  # Optional: Flower monitoring UI on http://localhost:5555
  flower:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    command: celery -A celery_app flower --port=5555
    ports:
      - "5555:5555"
